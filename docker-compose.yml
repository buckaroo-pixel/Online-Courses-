services:
  postgres:
    image: postgres:16-alpine
    container_name: courses-postgres
    environment:
      POSTGRES_DB: courses_db
      POSTGRES_USER: courses_user
      POSTGRES_PASSWORD: courses_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courses_user -d courses_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: courses-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/courses_db
      SPRING_DATASOURCE_USERNAME: courses_user
      SPRING_DATASOURCE_PASSWORD: courses_pass
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started

  mailhog:
    image: mailhog/mailhog:latest
    container_name: courses-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data: