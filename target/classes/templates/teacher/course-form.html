<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, 'Новый курс')}">
<body>
<div th:fragment="content">
    <div class="container" style="max-width:700px">
        <h1 class="section-title">Создать курс</h1>
        <div class="content-box">
            <form th:action="@{/teacher/courses}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" name="title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea name="description" class="form-control" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Создать</button>
                <a th:href="@{/teacher/courses}" class="btn btn-sm" style="margin-left:0.5rem">Отмена</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
