<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, 'Вход')}">
<body>
<div th:fragment="content">
    <div class="container auth-container">
        <div class="card">
            <h2 style="margin-bottom:1.5rem;text-align:center">Вход в систему</h2>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="username" class="form-control" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Войти</button>
            </form>
            <p class="mt-2 text-muted" style="text-align:center">
                <a th:href="@{/forgot-password}">Забыли пароль?</a> ·
                <a th:href="@{/register}">Регистрация</a>
            </p>
            <div class="alert alert-info mt-2" style="font-size:0.8rem">
                Демо-аккаунты VioletBloom: student@courses.ru · teacher@courses.ru · admin@courses.ru — пароль: <b>password</b>
            </div>
        </div>
    </div>
</div>
</body>
</html>
