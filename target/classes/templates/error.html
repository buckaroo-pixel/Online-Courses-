<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, 'Ошибка')}">
<body>
<div th:fragment="content">
    <div class="container" style="text-align:center;padding:4rem">
        <h1>Ошибка</h1>
        <p class="text-muted mt-2" th:text="${error}">Что-то пошло не так</p>
        <a th:href="@{/}" class="btn btn-primary mt-2">На главную</a>
    </div>
</div>
</body>
</html>
