spring:
  datasource:
    url: jdbc:h2:mem:courses_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop

  liquibase:
    enabled: false

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.courses: INFO