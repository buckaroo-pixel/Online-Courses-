<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, 'Редактирование курса')}">
<body>
<div th:fragment="content">
    <div class="container">
        <h1 class="section-title" th:text="'Редактирование: ' + ${course.title}">Курс</h1>

        <div class="content-box mb-2">
            <form th:action="@{/teacher/courses/{id}(id=${course.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" name="title" class="form-control" th:value="${course.title}" required>
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea name="description" class="form-control" rows="4" th:text="${course.description}" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Сохранить</button>
            </form>
            <div class="flex-between mt-2">
                <form th:action="@{/teacher/courses/{id}/publish(id=${course.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="published" th:value="${!course.published}">
                    <button type="submit" class="btn btn-success btn-sm"
                            th:text="${course.published} ? 'Снять с публикации' : 'Опубликовать'"></button>
                </form>
                <form th:action="@{/teacher/courses/{id}/delete(id=${course.id})}" method="post"
                      onsubmit="return confirm('Удалить курс?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger btn-sm">Удалить</button>
                </form>
            </div>
        </div>

        <h2 class="section-title">Разделы и уроки</h2>
        <div th:each="section : ${sections}" class="content-box mb-2">
            <h3 th:text="${section.title}">Раздел</h3>
            <ul class="lesson-list">
                <li class="lesson-item" th:each="lesson : ${section.lessons}">
                    <span th:text="${lesson.title} + ' [' + ${lesson.type} + ']'"></span>
                </li>
            </ul>
            <details class="mt-2">
                <summary class="btn btn-sm btn-primary" style="cursor:pointer">+ Добавить урок</summary>
                <form th:action="@{/teacher/sections/{sid}/lessons(sid=${section.id})}" method="post" class="mt-2">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="courseId" th:value="${course.id}">
                    <div class="form-group"><label>Название</label><input name="title" class="form-control" required></div>
                    <div class="form-group"><label>Контент</label><textarea name="content" class="form-control" rows="3"></textarea></div>
                    <div class="form-group">
                        <label>Тип</label>
                        <select name="type" class="form-control">
                            <option value="TEXT">Текст</option>
                            <option value="VIDEO">Видео</option>
                            <option value="AUDIO">Аудио</option>
                            <option value="PRESENTATION">Презентация</option>
                        </select>
                    </div>
                    <div class="form-group"><label>URL медиа (для видео/аудио)</label><input name="mediaUrl" class="form-control"></div>
                    <div class="form-group"><label>Порядок</label><input name="orderIndex" type="number" class="form-control" value="1"></div>
                    <div class="form-group"><label>Длительность (мин)</label><input name="duration" type="number" class="form-control"></div>
                    <button type="submit" class="btn btn-primary btn-sm">Добавить урок</button>
                </form>
            </details>
        </div>

        <div class="content-box mb-2">
            <h3>Добавить раздел</h3>
            <form th:action="@{/teacher/courses/{id}/sections(id=${course.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group"><label>Название раздела</label><input name="title" class="form-control" required></div>
                <div class="form-group"><label>Порядок</label><input name="orderIndex" type="number" class="form-control" value="1"></div>
                <button type="submit" class="btn btn-primary btn-sm">Добавить раздел</button>
            </form>
        </div>

        <div class="content-box" th:if="${sections != null and !sections.empty}">
            <h3>Добавить задание к уроку</h3>
            <form method="post" th:action="@{/teacher/lessons/0/assignments}" id="assignForm">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="courseId" th:value="${course.id}">
                <div class="form-group">
                    <label>Урок</label>
                    <select name="lessonId" class="form-control" required
                            th:onchange="'document.getElementById(\'assignForm\').action=\'' + @{/teacher/lessons/} + '\' + this.value + \'/assignments\''">
                        <option value="">Выберите урок</option>
                        <th:block th:each="section : ${sections}">
                            <option th:each="lesson : ${section.lessons}"
                                    th:value="${lesson.id}" th:text="${lesson.title}"></option>
                        </th:block>
                    </select>
                </div>
                <div class="form-group"><label>Название</label><input name="title" class="form-control" required></div>
                <div class="form-group"><label>Описание</label><textarea name="description" class="form-control" rows="2"></textarea></div>
                <div class="form-group">
                    <label>Тип</label>
                    <select name="type" class="form-control">
                        <option value="QUIZ">Тест (автопроверка)</option>
                        <option value="PRACTICAL">Практическая работа</option>
                    </select>
                </div>
                <div class="form-group"><label>Макс. балл</label><input name="maxScore" type="number" class="form-control" value="100"></div>
                <button type="submit" class="btn btn-primary btn-sm">Добавить задание</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
