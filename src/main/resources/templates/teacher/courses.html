<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, 'Мои курсы')}">
<body>
<div th:fragment="content">
    <div class="container">
        <div class="flex-between mb-2">
            <h1 class="section-title" style="border:none;margin:0">Мои курсы</h1>
            <a th:href="@{/teacher/courses/new}" class="btn btn-primary">+ Создать курс</a>
        </div>
        <div class="card-grid">
            <div class="card" th:each="course : ${courses.content}">
                <span th:class="${course.published} ? 'badge badge-published' : 'badge badge-draft'"
                      th:text="${course.published} ? 'Опубликован' : 'Черновик'"></span>
                <h3 th:text="${course.title}">Курс</h3>
                <p class="meta" th:text="${#strings.abbreviate(course.description, 100)}"></p>
                <p class="text-muted" th:text="${course.sectionCount} + ' разделов · ' + ${course.lessonCount} + ' уроков'"></p>
                <a th:href="@{/teacher/courses/{id}/edit(id=${course.id})}" class="btn btn-primary btn-sm">Редактировать</a>
            </div>
        </div>
        <div th:if="${courses.empty}" class="alert alert-info">У вас пока нет курсов.</div>
    </div>
</div>
</body>
</html>
