<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, 'Регистрация')}">
<body>
<div th:fragment="content">
    <div class="container auth-container">
        <div class="card">
            <h2 style="margin-bottom:1.5rem;text-align:center">Регистрация</h2>
            <form th:action="@{/register}" th:object="${registerDto}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" th:field="*{firstName}" class="form-control" required>
                    <span th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="alert-error"></span>
                </div>
                <div class="form-group">
                    <label>Фамилия</label>
                    <input type="text" th:field="*{lastName}" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" th:field="*{password}" class="form-control" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Зарегистрироваться</button>
            </form>
            <p class="mt-2 text-muted" style="text-align:center">
                Уже есть аккаунт? <a th:href="@{/login}">Войти</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
