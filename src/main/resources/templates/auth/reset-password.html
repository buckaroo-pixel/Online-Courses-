<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, 'Новый пароль')}">
<body>
<div th:fragment="content">
    <div class="container auth-container">
        <div class="card">
            <h2 style="margin-bottom:1.5rem;text-align:center">Новый пароль</h2>
            <form th:action="@{/reset-password/{token}(token=${token})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label>Новый пароль</label>
                    <input type="password" name="password" class="form-control" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Подтвердите пароль</label>
                    <input type="password" name="confirmPassword" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Сохранить</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
