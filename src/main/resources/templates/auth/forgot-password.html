<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::content}, 'Восстановление пароля')}">
<body>
<div th:fragment="content">
    <div class="container auth-container">
        <div class="card">
            <h2 style="margin-bottom:1.5rem;text-align:center">Восстановление пароля</h2>
            <p class="text-muted mb-2">Введите email — мы отправим ссылку для сброса пароля.</p>
            <form th:action="@{/forgot-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Отправить</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
